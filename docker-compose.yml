version: '3.8'

services:
  db-ftd:
    image: postgres:15-alpine
    container_name: db-ia-ftd
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./init-db:/docker-entrypoint-initdb.d

  api-ftd:
    build: .
    container_name: api-ia-ftd
    ports:
      - "5000:5000"
    command: python app.py
    environment:
      - DATABASE_URL=${DATABASE_URL}
    depends_on:
      - db-ftd

volumes:
  pgdata: